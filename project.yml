name: SDCardImportAssistant
options:
  bundleIdPrefix: com.cullenroberts
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"
  minimumXcodeGenVersion: "2.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  SDCardImportAssistant:
    type: application
    platform: macOS
    sources:
      - path: SDCardImportAssistant
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cullenroberts.SDCardImportAssistant
        PRODUCT_NAME: "SD Card Import Assistant"
        INFOPLIST_FILE: SDCardImportAssistant/Info.plist
        CODE_SIGN_ENTITLEMENTS: SDCardImportAssistant/SDCardImportAssistant.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
      configs:
        debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - sdk: ServiceManagement.framework
      - sdk: UserNotifications.framework
